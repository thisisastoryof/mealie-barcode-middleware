<!doctype html>
{% set t = get_theme() %}
<html lang="en" data-bs-theme="{{ t.mode }}">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
    <title>Setup — Barcode Middleware</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="stylesheet" href="/static/vendor/inter/inter.css">
    <link rel="stylesheet" href="/static/vendor/tabler/css/tabler.min.css">
    <link rel="stylesheet" href="/theme.css">
    <link rel="stylesheet" href="/static/vendor/tabler-icons/tabler-icons.min.css">
    <link rel="stylesheet" href="/static/css/app.css?v={{ v }}">
    <script src="/static/js/theme-init.js?v={{ v }}"></script>
</head>
<body class="d-flex flex-column">
    <div class="page page-center">
        <div class="container container-tight py-4">
            <div class="text-center mb-4">
                <a href="/" class="navbar-brand navbar-brand-autodark d-inline-flex align-items-center text-decoration-none">
                    <i class="ti ti-scan icon icon-md me-1"></i>
                    Barcode Middleware
                </a>
            </div>
            <div class="card card-md">
                <div class="card-body">
                    <h2 class="h2 text-center mb-2">Welcome</h2>
                    <p class="text-secondary text-center mb-4">Create the administrator account to get started.</p>
                    {% if error %}
                    <div class="alert alert-danger">{{ error }}</div>
                    {% endif %}
                    <form action="/setup" method="post" autocomplete="on">
                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <input type="text" name="username" class="form-control" placeholder="admin" autocomplete="username" required autofocus minlength="3">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" name="password" class="form-control" placeholder="At least 8 characters" autocomplete="new-password" required minlength="8">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Confirm password</label>
                            <input type="password" name="password_confirm" class="form-control" placeholder="Repeat password" autocomplete="new-password" required minlength="8">
                        </div>
                        <div class="form-footer">
                            <button type="submit" class="btn btn-primary w-100">Create account</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script src="/static/vendor/tabler/js/tabler.min.js"></script>
</body>
</html>
