{% extends "base.html" %}
{% block title %}{{ doc_title }} — Docs — Barcode Middleware{% endblock %}

{% block content %}
<!-- BEGIN PAGE HEADER -->
<div class="page-header d-print-none mb-3">
    <div class="row g-2 align-items-center">
        <div class="col-auto">
            <a href="/docs" class="btn btn-ghost-secondary btn-sm" title="Back to Documentation">
                <i class="ti ti-arrow-left icon"></i>
            </a>
        </div>
        <div class="col">
            <div class="page-pretitle">Documentation</div>
            <h2 class="page-title">
                <i class="ti {{ doc_icon }} icon me-1"></i>
                {{ doc_title }}
            </h2>
        </div>
    </div>
</div>
<!-- END PAGE HEADER -->

<div class="card">
    <div class="card-body markdown">
        {{ doc_html | safe }}
    </div>
</div>
{% endblock %}
