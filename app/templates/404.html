{% extends "base.html" %}
{% block title %}Not Found — Barcode Middleware{% endblock %}

{% block content %}
<div class="page-header d-print-none mb-3">
    <div class="row g-2 align-items-center">
        <div class="col">
            <h2 class="page-title">Page Not Found</h2>
        </div>
    </div>
</div>

<div class="card">
    <div class="card-body">
        <div class="empty">
            <p class="empty-title">{{ message }}</p>
            <p class="empty-subtitle text-secondary">The resource you requested could not be found.</p>
            <div class="empty-action">
                <a href="/" class="btn btn-primary">
                    <i class="ti ti-arrow-left icon" aria-hidden="true"></i>
                    Back to Dashboard
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
