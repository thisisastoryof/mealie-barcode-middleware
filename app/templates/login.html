<!doctype html>
{% set t = get_theme() %}
<html lang="en" data-bs-theme="{{ t.mode }}">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
    <title>Login — Barcode Middleware</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="stylesheet" href="/static/vendor/inter/inter.css">
    <link rel="stylesheet" href="/static/vendor/tabler/css/tabler.min.css">
    <link rel="stylesheet" href="/theme.css">
    <link rel="stylesheet" href="/static/vendor/tabler-icons/tabler-icons.min.css">
    <link rel="stylesheet" href="/static/css/app.css?v={{ v }}">
    <script src="/static/js/theme-init.js?v={{ v }}"></script>
</head>
<body class="d-flex flex-column">
    <div class="page page-center">
        <div class="container container-tight py-4">
            <div class="text-center mb-4">
                <a href="/" class="navbar-brand navbar-brand-autodark d-inline-flex align-items-center text-decoration-none">
                    <i class="ti ti-scan icon icon-md me-1"></i>
                    Barcode Middleware
                </a>
            </div>
            <div class="card card-md">
                <div class="card-body">
                    <h2 class="h2 text-center mb-4">Login to your account</h2>
                    {% if error %}
                    <div class="alert alert-danger">{{ error }}</div>
                    {% endif %}
                    <form action="/login" method="post" autocomplete="on">
                        <input type="hidden" name="next" value="{{ next or '' }}">
                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <input type="text" name="username" class="form-control" placeholder="Your username" autocomplete="username" required autofocus>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" name="password" class="form-control" placeholder="Your password" autocomplete="current-password" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-check">
                                <input type="checkbox" name="remember" value="1" class="form-check-input"/>
                                <span class="form-check-label">Remember me on this device</span>
                            </label>
                        </div>
                        <div class="form-footer">
                            <button type="submit" class="btn btn-primary w-100">Sign in</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script src="/static/vendor/tabler/js/tabler.min.js"></script>
</body>
</html>
