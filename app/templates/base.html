<!doctype html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
    <title>{% block title %}Barcode Middleware{% endblock %}</title>
    <link rel="stylesheet" href="/static/vendor/tabler/css/tabler.min.css">
    <script>
      // Apply saved theme before render to avoid flash
      (function() {
        var t = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-bs-theme', t);
      })();
    </script>
</head>
<body class="d-flex flex-column">
    <div class="page">
        <!-- Navbar -->
        <header class="navbar navbar-expand-md d-print-none">
            <div class="container-xl">
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbar-menu">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <h1 class="navbar-brand navbar-brand-autodark d-none-navbar-horizontal pe-0 pe-md-3">
                    <a href="/">Barcode Middleware</a>
                </h1>
                <div class="collapse navbar-collapse" id="navbar-menu">
                    <ul class="navbar-nav">
                        <li class="nav-item{{ ' active' if request.url.path == '/' }}"><a class="nav-link" href="/">Dashboard</a></li>
                        <li class="nav-item{{ ' active' if request.url.path.startswith('/barcodes') }}"><a class="nav-link" href="/barcodes">Barcodes</a></li>
                        <li class="nav-item{{ ' active' if request.url.path.startswith('/foods') }}"><a class="nav-link" href="/foods">Foods</a></li>
                        <li class="nav-item{{ ' active' if request.url.path == '/settings' }}"><a class="nav-link" href="/settings">Settings</a></li>
                        <li class="nav-item{{ ' active' if request.url.path.startswith('/settings/tokens') }}"><a class="nav-link" href="/settings/tokens">Tokens</a></li>
                    </ul>
                </div>
                <div class="navbar-nav flex-row order-md-last">
                    <a href="#" class="nav-link px-0" id="theme-toggle" title="Toggle dark mode">
                        <svg id="icon-moon" xmlns="http://www.w3.org/2000/svg" class="icon" width="24" height="24" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round">
                            <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
                            <path d="M12 3c.132 0 .263 0 .393 0a7.5 7.5 0 0 0 7.92 12.446a9 9 0 1 1 -8.313 -12.454z"/>
                        </svg>
                        <svg id="icon-sun" xmlns="http://www.w3.org/2000/svg" class="icon d-none" width="24" height="24" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round">
                            <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
                            <path d="M12 12m-4 0a4 4 0 1 0 8 0a4 4 0 1 0 -8 0"/>
                            <path d="M3 12h1m8 -9v1m8 8h1m-9 8v1m-6.4 -15.4l.7 .7m12.1 -.7l-.7 .7m0 11.4l.7 .7m-12.1 -.7l-.7 .7"/>
                        </svg>
                    </a>
                    <!-- Notification bell -->
                    <div class="nav-item dropdown ms-2" id="notif-dropdown">
                        <a href="#" class="nav-link px-0" data-bs-toggle="dropdown" tabindex="-1" aria-label="Show notifications" data-bs-auto-close="outside">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon">
                                <path d="M10 5a2 2 0 1 1 4 0a7 7 0 0 1 4 6v3a4 4 0 0 0 2 3h-16a4 4 0 0 0 2 -3v-3a7 7 0 0 1 4 -6"></path>
                                <path d="M9 17v1a3 3 0 0 0 6 0v-1"></path>
                            </svg>
                            <span class="badge bg-red badge-empty d-none" id="notif-badge"></span>
                        </a>
                        <div class="dropdown-menu dropdown-menu-arrow dropdown-menu-end dropdown-menu-card" style="width: 22rem;">
                            <div class="card">
                                <div class="card-header d-flex">
                                    <h3 class="card-title">Notifications</h3>
                                    <button type="button" class="btn-close ms-auto" data-bs-dismiss="dropdown" aria-label="Close"></button>
                                </div>
                                <div class="list-group list-group-flush list-group-hoverable" id="notif-list" style="max-height: 20rem; overflow-y: auto;">
                                    <div class="list-group-item text-center text-secondary" id="notif-empty">No new notifications</div>
                                </div>
                                <div class="card-body">
                                    <a href="#" class="btn btn-2 w-100" id="notif-mark-all">Mark all as read</a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </header>
        <!-- Live scan alerts -->
        <div id="scan-alerts" class="container-xl mt-2"></div>
        <!-- Page body -->
        <div class="page-wrapper">
            <div class="page-body">
                <div class="container-xl">
                    {% block content %}{% endblock %}
                </div>
            </div>
        </div>
    </div>
    <script src="/static/vendor/tabler/js/tabler.min.js"></script>
    <script>
    (function() {
        var toggle = document.getElementById('theme-toggle');
        var iconMoon = document.getElementById('icon-moon');
        var iconSun = document.getElementById('icon-sun');
        function applyIcons(theme) {
            if (theme === 'dark') {
                iconMoon.classList.add('d-none');
                iconSun.classList.remove('d-none');
            } else {
                iconMoon.classList.remove('d-none');
                iconSun.classList.add('d-none');
            }
        }
        applyIcons(document.documentElement.getAttribute('data-bs-theme'));
        toggle.addEventListener('click', function(e) {
            e.preventDefault();
            var current = document.documentElement.getAttribute('data-bs-theme');
            var next = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-bs-theme', next);
            localStorage.setItem('theme', next);
            applyIcons(next);
        });
    })();
    </script>
    <script>
    (function() {
        var alertsDiv = document.getElementById('scan-alerts');
        if (!window.EventSource) return;

        // Register service worker for mobile notification support
        var swReg = null;
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/static/sw.js').then(function(reg) {
                swReg = reg;
            });
        }

        // Request browser notification permission on first visit
        if ('Notification' in window && Notification.permission === 'default') {
            Notification.requestPermission();
        }

        var es = new EventSource('/events');
        es.addEventListener('scan', function(e) {
            var data = JSON.parse(e.data);
            var barcode = data.barcode;
            var result = data.result;
            var food = data.food;

            var color, title, desc;
            if (result === 'added') {
                color = 'success';
                title = 'Added to shopping list';
                desc = '<strong>' + _esc(food) + '</strong> <span class="text-secondary">(' + _esc(barcode) + ')</span>';
            } else if (result === 'added_as_note') {
                color = 'info';
                title = 'Added as note';
                desc = '<strong>' + _esc(food) + '</strong> <span class="text-secondary">(' + _esc(barcode) + ')</span>';
            } else if (result === 'queued') {
                color = 'warning';
                title = 'Queued for retry';
                desc = _esc(food || barcode);
            } else {
                color = 'danger';
                title = 'Unknown barcode';
                desc = '<code>' + _esc(barcode) + '</code>';
            }

            var link = '/barcodes/' + encodeURIComponent(barcode);
            var html = '<div class="alert alert-' + color + ' alert-dismissible" role="alert">'
                + '<div class="d-flex align-items-center">'
                + '<div class="alert-icon">'
                + '<svg xmlns="http://www.w3.org/2000/svg" class="icon icon-2" width="24" height="24" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round">'
                + '<path stroke="none" d="M0 0h24v24H0z" fill="none"/>'
                + '<path d="M4 7v-1a2 2 0 0 1 2 -2h2"/><path d="M4 17v1a2 2 0 0 0 2 2h2"/>'
                + '<path d="M16 4h2a2 2 0 0 1 2 2v1"/><path d="M16 20h2a2 2 0 0 0 2 -2v-1"/>'
                + '<path d="M5 11h1v2h-1z"/><path d="M10 11v2"/><path d="M14 11h1v2h-1z"/><path d="M19 11v2"/>'
                + '</svg></div>'
                + '<div class="ms-2"><h4 class="alert-heading mb-0">' + title + '</h4>'
                + '<div class="text-secondary">' + desc
                + ' &mdash; <a href="' + link + '" class="alert-link">View / Map</a></div></div></div>'
                + '<a class="btn-close" data-bs-dismiss="alert" aria-label="close"></a></div>';

            alertsDiv.insertAdjacentHTML('afterbegin', html);

            // Auto-dismiss after 15s
            var first = alertsDiv.firstElementChild;
            setTimeout(function() { if (first && first.parentNode) first.remove(); }, 15000);

            // Browser notification (service worker for mobile, fallback for desktop)
            if ('Notification' in window && Notification.permission === 'granted') {
                var body = food ? food + ' (' + barcode + ')' : barcode;
                if (swReg) {
                    swReg.showNotification(title, { body: body, tag: barcode, data: { url: link } });
                } else {
                    var n = new Notification(title, { body: body, tag: barcode });
                    n.onclick = function() { window.focus(); window.location.href = link; };
                }
            }

            // Partial dashboard update if currently viewing it
            if (window.location.pathname === '/') {
                clearTimeout(window._dashRefresh);
                window._dashRefresh = setTimeout(function() { _refreshDashboard(); }, 2000);
            }

            // Add to notification bell only for actionable items (not already-mapped scans)
            if (result !== 'added') {
                var notifTitle = result === 'added_as_note' ? 'Mapping needed' :
                                 result === 'unknown' ? 'Unknown barcode' :
                                 result === 'queued' ? 'Mapping needed' : title;
                var notifMsg = food ? food + ' (' + barcode + ')' : barcode;
                var notifResult = result === 'unknown' ? 'unknown' :
                                  result === 'added_as_note' || result === 'queued' ? 'needs_mapping' : result;
                _addNotifItem({barcode: barcode, title: notifTitle, message: notifMsg, result: notifResult});
            }
        });

        function _esc(s) {
            if (!s) return '';
            var d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        function _refreshDashboard() {
            fetch('/api/dashboard').then(function(r) { return r.json(); }).then(function(d) {
                var el;
                el = document.getElementById('stat-total');
                if (el) el.textContent = d.total_barcodes;
                el = document.getElementById('stat-mapped');
                if (el) el.textContent = d.mapped_count;
                el = document.getElementById('stat-pending');
                if (el) el.textContent = d.pending_count;
                el = document.getElementById('stat-queue');
                if (el) {
                    el.textContent = d.queue_depth;
                    el.className = 'h1 mb-0 text-' + (d.queue_depth === 0 ? 'green' : 'red');
                }
                var tbody = document.getElementById('recent-scans-body');
                if (tbody && d.recent_items) {
                    var badgeMap = {mapped: 'green', queued: 'orange', unknown: 'red', pending: 'yellow'};
                    var labelMap = {mapped: 'Mapped', queued: 'Queued', unknown: 'Unknown', pending: 'Pending'};
                    var rows = '';
                    d.recent_items.forEach(function(item) {
                        var bg = badgeMap[item.status] || 'secondary';
                        rows += '<tr>'
                            + '<td><a href="/barcodes/' + _esc(item.barcode) + '">' + _esc(item.barcode) + '</a></td>'
                            + '<td>' + _esc(item.title) + '</td>'
                            + '<td>' + _esc(item.source) + '</td>'
                            + '<td><span class="badge bg-' + bg + ' text-' + bg + '-fg">' + labelMap[item.status] + '</span></td>'
                            + '<td>' + _esc(item.created_at) + '</td>'
                            + '</tr>';
                    });
                    if (!rows) rows = '<tr><td colspan="5" class="text-center text-secondary">No scans yet</td></tr>';
                    tbody.innerHTML = rows;
                }
            });
        }
    })();
    </script>
    <script>
    (function() {
        var badge = document.getElementById('notif-badge');
        var list = document.getElementById('notif-list');
        var empty = document.getElementById('notif-empty');
        var markAllBtn = document.getElementById('notif-mark-all');
        var count = 0;

        function _updateBadge() {
            if (count > 0) {
                badge.classList.remove('d-none');
            } else {
                badge.classList.add('d-none');
            }
            empty.style.display = count > 0 ? 'none' : '';
        }

        function _statusDotClass(result) {
            if (result === 'auto_mapped') return 'bg-azure';
            if (result === 'needs_mapping') return 'bg-yellow';
            return 'bg-red';
        }

        window._addNotifItem = function(n) {
            var link = '/barcodes/' + encodeURIComponent(n.barcode);
            var dotClass = _statusDotClass(n.result);
            var item = document.createElement('a');
            item.className = 'list-group-item list-group-item-action';
            item.href = link;
            if (n.id) item.dataset.id = n.id;
            item.dataset.barcode = n.barcode;
            item.innerHTML = '<div class="row align-items-center">'
                + '<div class="col-auto"><span class="status-dot status-dot-animated ' + dotClass + ' d-block"></span></div>'
                + '<div class="col text-truncate">'
                + '<span class="text-body d-block">' + _esc(n.title) + '</span>'
                + '<div class="d-block text-secondary text-truncate mt-n1">' + _esc(n.message) + '</div>'
                + '</div></div>';
            list.insertBefore(item, list.firstChild);
            count++;
            _updateBadge();
        };

        function _esc(s) {
            if (!s) return '';
            var d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        // Load existing unread notifications on page load
        fetch('/api/notifications').then(function(r) { return r.json(); }).then(function(items) {
            items.reverse().forEach(function(n) {
                _addNotifItem(n);
            });
        });

        // Mark all as read
        markAllBtn.addEventListener('click', function(e) {
            e.preventDefault();
            fetch('/api/notifications/read-all', { method: 'POST' }).then(function() {
                // Remove all items from list
                var items = list.querySelectorAll('.list-group-item:not(#notif-empty)');
                items.forEach(function(el) { el.remove(); });
                count = 0;
                _updateBadge();
            });
        });
    })();
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
