<!doctype html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
    <title>{% block title %}Barcode Middleware{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <!-- Inter font (bundled for offline use) -->
    <link rel="stylesheet" href="/static/vendor/inter/inter.css">
    <link rel="stylesheet" href="/static/vendor/tabler/css/tabler.min.css">
    <link rel="stylesheet" href="/static/vendor/tabler-icons/tabler-icons.min.css">
    <link rel="stylesheet" href="/static/css/app.css">
    <script>
      // Apply saved theme before render to avoid flash
      (function() {
        var t = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-bs-theme', t);
      })();
    </script>
</head>
<body>
    <div class="page">
        <!-- Navbar -->
        <header class="navbar navbar-expand-md d-print-none">
            <div class="container-xl">
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbar-menu" aria-controls="navbar-menu" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="navbar-brand navbar-brand-autodark d-none-navbar-horizontal pe-0 pe-md-3">
                    <a href="/" class="text-decoration-none d-inline-flex align-items-center">
                        <i class="ti ti-scan icon icon-md me-1"></i>
                        <span class="d-none d-md-inline">Mealie </span>Barcode Middleware
                    </a>
                </div>
                <div class="navbar-nav flex-row order-md-last">
                    <div class="d-none d-md-flex">
                        <!-- Dark mode toggle -->
                        <div class="nav-item">
                            <a href="#" class="nav-link px-0 hide-theme-dark" id="theme-toggle-dark" title="Enable dark mode">
                                <i class="ti ti-moon icon"></i>
                            </a>
                            <a href="#" class="nav-link px-0 hide-theme-light" id="theme-toggle-light" title="Enable light mode">
                                <i class="ti ti-sun icon"></i>
                            </a>
                        </div>
                        <!-- Settings cog -->
                        <div class="nav-item ms-2">
                            <a href="/settings" class="nav-link px-0" title="Settings">
                                <i class="ti ti-settings icon"></i>
                            </a>
                        </div>
                    </div>
                    <!-- Notification bell (always visible) -->
                    <div class="nav-item dropdown ms-2" id="notif-dropdown">
                        <a href="#" class="nav-link px-0" data-bs-toggle="dropdown" tabindex="-1" aria-label="Show notifications" data-bs-auto-close="outside">
                            <i class="ti ti-bell icon"></i>
                            <span class="badge bg-red badge-empty d-none" id="notif-badge"></span>
                        </a>
                        <div class="dropdown-menu dropdown-menu-arrow dropdown-menu-end dropdown-menu-card">
                            <div class="card">
                                <div class="card-header d-flex">
                                    <h3 class="card-title">Notifications</h3>
                                    <button type="button" class="btn-close ms-auto" data-bs-dismiss="dropdown" aria-label="Close"></button>
                                </div>
                                <div class="list-group list-group-flush list-group-hoverable notif-list" id="notif-list">
                                    <div class="list-group-item text-center text-secondary" id="notif-empty">No new notifications</div>
                                </div>
                                <div class="card-body">
                                    <a href="#" class="btn btn-secondary w-100" id="notif-mark-all">Mark all as read</a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="collapse navbar-collapse" id="navbar-menu">
                    <ul class="navbar-nav">
                        <li class="nav-item{{ ' active' if request.url.path == '/' }}"><a class="nav-link" href="/"><i class="ti ti-dashboard me-1"></i>Dashboard</a></li>
                        <li class="nav-item{{ ' active' if request.url.path.startswith('/barcodes') }}"><a class="nav-link" href="/barcodes"><i class="ti ti-barcode me-1"></i>Barcodes</a></li>
                        <li class="nav-item{{ ' active' if request.url.path.startswith('/foods') }}"><a class="nav-link" href="/foods"><i class="ti ti-apple me-1"></i>Foods</a></li>
                        <li class="nav-item d-md-none{{ ' active' if request.url.path.startswith('/settings') }}"><a class="nav-link" href="/settings"><i class="ti ti-settings me-1"></i>Settings</a></li>
                        <li class="nav-item d-md-none">
                            <a href="#" class="nav-link hide-theme-dark" id="theme-toggle-dark-mobile"><i class="ti ti-moon me-1"></i>Dark mode</a>
                            <a href="#" class="nav-link hide-theme-light" id="theme-toggle-light-mobile"><i class="ti ti-sun me-1"></i>Light mode</a>
                        </li>
                    </ul>
                </div>
            </div>
        </header>
        <!-- Live scan alerts -->
        <div id="scan-alerts" class="container-xl mt-2"></div>
        <!-- Page body -->
        <div class="page-wrapper">
            <div class="page-body">
                <div class="container-xl">
                    {% block content %}{% endblock %}
                </div>
            </div>
        </div>
    </div>
    <script src="/static/vendor/tabler/js/tabler.min.js"></script>
    <script src="/static/js/app.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
