<!doctype html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
    <title>{% block title %}Barcode Middleware{% endblock %}</title>
    <link rel="stylesheet" href="/static/vendor/tabler/css/tabler.min.css">
    <script>
      // Apply saved theme before render to avoid flash
      (function() {
        var t = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-bs-theme', t);
      })();
    </script>
</head>
<body class="d-flex flex-column">
    <div class="page">
        <!-- Navbar -->
        <header class="navbar navbar-expand-md d-print-none">
            <div class="container-xl">
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbar-menu">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <h1 class="navbar-brand navbar-brand-autodark d-none-navbar-horizontal pe-0 pe-md-3">
                    <a href="/">Barcode Middleware</a>
                </h1>
                <div class="collapse navbar-collapse" id="navbar-menu">
                    <ul class="navbar-nav">
                        <li class="nav-item"><a class="nav-link" href="/">Dashboard</a></li>
                        <li class="nav-item"><a class="nav-link" href="/barcodes">Barcodes</a></li>
                        <li class="nav-item"><a class="nav-link" href="/foods">Foods</a></li>
                        <li class="nav-item"><a class="nav-link" href="/settings">Settings</a></li>
                        <li class="nav-item"><a class="nav-link" href="/settings/tokens">Tokens</a></li>
                    </ul>
                </div>
                <div class="navbar-nav flex-row order-md-last">
                    <a href="#" class="nav-link px-0" id="theme-toggle" title="Toggle dark mode">
                        <svg id="icon-moon" xmlns="http://www.w3.org/2000/svg" class="icon" width="24" height="24" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round">
                            <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
                            <path d="M12 3c.132 0 .263 0 .393 0a7.5 7.5 0 0 0 7.92 12.446a9 9 0 1 1 -8.313 -12.454z"/>
                        </svg>
                        <svg id="icon-sun" xmlns="http://www.w3.org/2000/svg" class="icon d-none" width="24" height="24" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round">
                            <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
                            <path d="M12 12m-4 0a4 4 0 1 0 8 0a4 4 0 1 0 -8 0"/>
                            <path d="M3 12h1m8 -9v1m8 8h1m-9 8v1m-6.4 -15.4l.7 .7m12.1 -.7l-.7 .7m0 11.4l.7 .7m-12.1 -.7l-.7 .7"/>
                        </svg>
                    </a>
                </div>
            </div>
        </header>
        <!-- Live scan alerts -->
        <div id="scan-alerts" class="container-xl mt-2"></div>
        <!-- Page body -->
        <div class="page-wrapper">
            <div class="page-body">
                <div class="container-xl">
                    {% block content %}{% endblock %}
                </div>
            </div>
        </div>
    </div>
    <script src="/static/vendor/tabler/js/tabler.min.js"></script>
    <script>
    (function() {
        var toggle = document.getElementById('theme-toggle');
        var iconMoon = document.getElementById('icon-moon');
        var iconSun = document.getElementById('icon-sun');
        function applyIcons(theme) {
            if (theme === 'dark') {
                iconMoon.classList.add('d-none');
                iconSun.classList.remove('d-none');
            } else {
                iconMoon.classList.remove('d-none');
                iconSun.classList.add('d-none');
            }
        }
        applyIcons(document.documentElement.getAttribute('data-bs-theme'));
        toggle.addEventListener('click', function(e) {
            e.preventDefault();
            var current = document.documentElement.getAttribute('data-bs-theme');
            var next = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-bs-theme', next);
            localStorage.setItem('theme', next);
            applyIcons(next);
        });
    })();
    </script>
    <script>
    (function() {
        var alertsDiv = document.getElementById('scan-alerts');
        if (!window.EventSource) return;
        var es = new EventSource('/events');
        es.addEventListener('scan', function(e) {
            var data = JSON.parse(e.data);
            var barcode = data.barcode;
            var result = data.result;
            var food = data.food;

            var color, title, desc;
            if (result === 'added') {
                color = 'success';
                title = 'Added to shopping list';
                desc = '<strong>' + _esc(food) + '</strong> <span class="text-secondary">(' + _esc(barcode) + ')</span>';
            } else if (result === 'added_as_note') {
                color = 'info';
                title = 'Added as note';
                desc = '<strong>' + _esc(food) + '</strong> <span class="text-secondary">(' + _esc(barcode) + ')</span>';
            } else if (result === 'queued') {
                color = 'warning';
                title = 'Queued for retry';
                desc = _esc(food || barcode);
            } else {
                color = 'danger';
                title = 'Unknown barcode';
                desc = '<code>' + _esc(barcode) + '</code>';
            }

            var link = '/barcodes/' + encodeURIComponent(barcode);
            var html = '<div class="alert alert-' + color + ' alert-dismissible" role="alert">'
                + '<div class="d-flex align-items-center">'
                + '<div class="alert-icon">'
                + '<svg xmlns="http://www.w3.org/2000/svg" class="icon icon-2" width="24" height="24" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round">'
                + '<path stroke="none" d="M0 0h24v24H0z" fill="none"/>'
                + '<path d="M4 7v-1a2 2 0 0 1 2 -2h2"/><path d="M4 17v1a2 2 0 0 0 2 2h2"/>'
                + '<path d="M16 4h2a2 2 0 0 1 2 2v1"/><path d="M16 20h2a2 2 0 0 0 2 -2v-1"/>'
                + '<path d="M5 11h1v2h-1z"/><path d="M10 11v2"/><path d="M14 11h1v2h-1z"/><path d="M19 11v2"/>'
                + '</svg></div>'
                + '<div class="ms-2"><h4 class="alert-heading mb-0">' + title + '</h4>'
                + '<div class="text-secondary">' + desc
                + ' &mdash; <a href="' + link + '" class="alert-link">View / Map</a></div></div></div>'
                + '<a class="btn-close" data-bs-dismiss="alert" aria-label="close"></a></div>';

            alertsDiv.insertAdjacentHTML('afterbegin', html);

            // Auto-dismiss after 15s
            var first = alertsDiv.firstElementChild;
            setTimeout(function() { if (first && first.parentNode) first.remove(); }, 15000);
        });

        function _esc(s) {
            if (!s) return '';
            var d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }
    })();
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
