{% extends "base.html" %}
{% block title %}Documentation — Mealie Barcode Middleware{% endblock %}

{% block content %}
<!-- BEGIN PAGE HEADER -->
<div class="page-header d-print-none mb-3">
    <div class="row g-2 align-items-center">
        <div class="col">
            <h2 class="page-title">Documentation</h2>
        </div>
    </div>
</div>
<!-- END PAGE HEADER -->

{% for group_name, docs in doc_groups %}
<div class="mb-4">
    <h3 class="mb-3">{{ group_name }}</h3>
    <div class="row row-cards">
        {% for doc in docs %}
        <div class="col-sm-6 col-lg-4">
            <a href="/docs/{{ doc.slug }}" class="card card-link">
                <div class="card-body">
                    <div class="d-flex align-items-center mb-3">
                        <span class="avatar bg-primary-lt me-3">
                            <i class="ti {{ doc.icon }}"></i>
                        </span>
                        <h3 class="card-title mb-0">{{ doc.title }}</h3>
                    </div>
                    <p class="text-secondary mb-0">{{ doc.description }}</p>
                </div>
            </a>
        </div>
        {% endfor %}
    </div>
</div>
{% endfor %}
{% endblock %}
