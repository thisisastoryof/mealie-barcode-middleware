#######################################################################################################
# ESP32 + GM67 Barcode Scanner — HTTP POST to Middleware
#######################################################################################################
#
# This ESPHome config sends scanned barcodes directly to the mealie-barcode-middleware
# via HTTP POST, removing Home Assistant from the critical data path.
#
# Replace placeholder values marked with ##### before flashing.
#

esphome:
  name: barcode-scanner
  friendly_name: Barcode Scanner
  on_boot:
    - text_sensor.template.publish:
        id: screen_mode
        state: "standby"

esp32:
  board: esp32dev
  framework:
    type: arduino

logger:

wifi:
  ssid: "######"
  password: "######"
  ap:
    ssid: "Barcode-Scanner-AP"
    password: "######"

captive_portal:

# HTTP request component for POSTing to the middleware
http_request:
  useragent: "ESPHome/BarcodeScanner"
  timeout: 10s

# JSON parsing support (for reading response body)
json:

# UART for GM67 barcode scanner module
uart:
  id: uart_bus
  rx_pin: GPIO16
  tx_pin: GPIO17
  baud_rate: 9600
  debug:
    direction: RX
    dummy_receiver: true
    after:
      delimiter: "\r"
    sequence:
      - lambda: |-
          std::string str(bytes.begin(), bytes.end());
          str.erase(str.find_last_not_of(" \n\r\t") + 1);
          if (str.empty()) return;
          // Ignore binary GM67 config responses — only accept printable ASCII
          for (char c : str) {
            if (c < 0x20 || c > 0x7E) return;
          }
          id(barcode_raw).publish_state(str);

# Template sensors for display state
text_sensor:
  - platform: template
    name: "Screen Mode"
    id: screen_mode
    
  - platform: template
    name: "Last Result"
    id: last_result

  - platform: template
    name: "Barcode Raw"
    id: barcode_raw
    on_value:
      then:
        - text_sensor.template.publish:
            id: screen_mode
            state: "scanning"
        - http_request.post:
            url: "http://YOUR-MIDDLEWARE-IP:9930/scan"
            request_headers:
              Content-Type: "application/json"
              Authorization: "Bearer YOUR-TOKEN-HERE"
            body: !lambda |-
              return "{\"barcode\":\"" + x + "\"}";
            capture_response: true
            max_response_buffer_size: 1024
            on_response:
              then:
                - if:
                    condition:
                      lambda: return response->status_code == 200;
                    then:
                      - lambda: |-
                          json::parse_json(body, [](JsonObject root) -> bool {
                            if (root["food"]) {
                              id(last_result).publish_state(root["food"].as<std::string>());
                            } else {
                              id(last_result).publish_state("Added");
                            }
                            return true;
                          });
                          id(screen_mode).publish_state("result");
                    else:
                      - lambda: |-
                          id(last_result).publish_state("Error");
                          id(screen_mode).publish_state("error");
                - script.execute: standby_timer
            on_error:
              then:
                - lambda: |-
                    id(last_result).publish_state("Offline");
                    id(screen_mode).publish_state("error");
                - script.execute: standby_timer

# Timer to return to standby after showing result
script:
  - id: standby_timer
    mode: restart
    then:
      - delay: 5s
      - text_sensor.template.publish:
          id: screen_mode
          state: "standby"
      - text_sensor.template.publish:
          id: last_result
          state: ""

#######################################################################################################
# GM67 Scanner Configuration (via UART commands)
#######################################################################################################
# These settings are stored in ESPHome's flash (restore_value: true) and re-applied on every boot.
# The GM67 does NOT persist UART-configured settings across power loss — ESPHome handles persistence.
# Change defaults via initial_option; after first boot, the last user selection is remembered.

select:
  # Scanning trigger mode
  - platform: template
    name: "Trigger Mode"
    id: scan_mode
    optimistic: true
    icon: mdi:auto-mode
    entity_category: CONFIG
    options:
      - Button Holding
      - Button Trigger
      - Continuous Scanning
      - Automatic Induction
      - Host
    initial_option: Automatic Induction
    restore_value: true
    on_value:
      - if:
          condition:
            lambda: 'return x == "Button Holding";'
          then:
            - uart.write:
                id: uart_bus
                data: [0x07, 0xC6, 0x04, 0x08, 0x00, 0x8A, 0x00, 0xFE, 0x9D]
      - if:
          condition:
            lambda: 'return x == "Button Trigger";'
          then:
            - uart.write:
                id: uart_bus
                data: [0x07, 0xC6, 0x04, 0x08, 0x00, 0x8A, 0x02, 0xFE, 0x9B]
      - if:
          condition:
            lambda: 'return x == "Continuous Scanning";'
          then:
            - uart.write:
                id: uart_bus
                data: [0x07, 0xC6, 0x04, 0x08, 0x00, 0x8A, 0x04, 0xFE, 0x99]
      - if:
          condition:
            lambda: 'return x == "Automatic Induction";'
          then:
            - uart.write:
                id: uart_bus
                data: [0x07, 0xC6, 0x04, 0x08, 0x00, 0x8A, 0x09, 0xFE, 0x94]
      - if:
          condition:
            lambda: 'return x == "Host";'
          then:
            - uart.write:
                id: uart_bus
                data: [0x07, 0xC6, 0x04, 0x08, 0x00, 0x8A, 0x08, 0xFE, 0x95]

  # Buzzer volume
  - platform: template
    name: "Buzzer Volume"
    id: buzzer_volume
    optimistic: true
    icon: mdi:volume-high
    entity_category: CONFIG
    options:
      - "Off"
      - Low
      - Medium
      - High
    initial_option: Medium
    restore_value: true
    on_value:
      - if:
          condition:
            lambda: 'return x == "Off";'
          then:
            - uart.write:
                id: uart_bus
                data: [0x07, 0xC6, 0x04, 0x08, 0x00, 0x38, 0x00, 0xFE, 0xEF]
      - if:
          condition:
            lambda: 'return x == "Low";'
          then:
            - uart.write:
                id: uart_bus
                data: [0x07, 0xC6, 0x04, 0x08, 0x00, 0x38, 0x01, 0xFE, 0xEE]
            - uart.write:
                id: uart_bus
                data: [0x07, 0xC6, 0x04, 0x08, 0x00, 0x8C, 0x02, 0xFE, 0x99]
      - if:
          condition:
            lambda: 'return x == "Medium";'
          then:
            - uart.write:
                id: uart_bus
                data: [0x07, 0xC6, 0x04, 0x08, 0x00, 0x38, 0x01, 0xFE, 0xEE]
            - uart.write:
                id: uart_bus
                data: [0x07, 0xC6, 0x04, 0x08, 0x00, 0x8C, 0x01, 0xFE, 0x9A]
      - if:
          condition:
            lambda: 'return x == "High";'
          then:
            - uart.write:
                id: uart_bus
                data: [0x07, 0xC6, 0x04, 0x08, 0x00, 0x38, 0x01, 0xFE, 0xEE]
            - uart.write:
                id: uart_bus
                data: [0x07, 0xC6, 0x04, 0x08, 0x00, 0x8C, 0x00, 0xFE, 0x9B]

  # Scanning light (illumination LED)
  - platform: template
    name: "Scanning Light"
    id: scanning_light
    optimistic: true
    icon: mdi:lightbulb-on
    entity_category: CONFIG
    options:
      - On When Reading
      - Always On
      - Always Off
    initial_option: On When Reading
    restore_value: true
    on_value:
      - if:
          condition:
            lambda: 'return x == "On When Reading";'
          then:
            - uart.write:
                id: uart_bus
                data: [0x08, 0xC6, 0x04, 0x08, 0x00, 0xF2, 0x02, 0x00, 0xFE, 0x32]
      - if:
          condition:
            lambda: 'return x == "Always On";'
          then:
            - uart.write:
                id: uart_bus
                data: [0x08, 0xC6, 0x04, 0x08, 0x00, 0xF2, 0x02, 0x01, 0xFE, 0x31]
      - if:
          condition:
            lambda: 'return x == "Always Off";'
          then:
            - uart.write:
                id: uart_bus
                data: [0x08, 0xC6, 0x04, 0x08, 0x00, 0xF2, 0x02, 0x02, 0xFE, 0x30]

  # Collimation (aiming laser)
  - platform: template
    name: "Collimation"
    id: collimation
    optimistic: true
    icon: mdi:line-scan
    entity_category: CONFIG
    options:
      - On When Reading
      - Always On
      - Always Off
    initial_option: On When Reading
    restore_value: true
    on_value:
      - if:
          condition:
            lambda: 'return x == "On When Reading";'
          then:
            - uart.write:
                id: uart_bus
                data: [0x08, 0xC6, 0x04, 0x08, 0x00, 0xF2, 0x03, 0x00, 0xFE, 0x31]
      - if:
          condition:
            lambda: 'return x == "Always On";'
          then:
            - uart.write:
                id: uart_bus
                data: [0x08, 0xC6, 0x04, 0x08, 0x00, 0xF2, 0x03, 0x01, 0xFE, 0x30]
      - if:
          condition:
            lambda: 'return x == "Always Off";'
          then:
            - uart.write:
                id: uart_bus
                data: [0x08, 0xC6, 0x04, 0x08, 0x00, 0xF2, 0x03, 0x02, 0xFE, 0x2F]

  # Same barcode re-scan delay
  - platform: template
    name: "Same Code Delay"
    id: same_code_delay
    optimistic: true
    icon: mdi:repeat-variant
    entity_category: CONFIG
    options:
      - 0.5s
      - 1s
      - 3s
      - 5s
      - 7s
      - No Repeat
    initial_option: 3s
    restore_value: true
    on_value:
      - if:
          condition:
            lambda: 'return x == "0.5s";'
          then:
            - uart.write:
                id: uart_bus
                data: [0x08, 0xC6, 0x04, 0x08, 0x00, 0xF3, 0x03, 0x05, 0xFE, 0x2B]
      - if:
          condition:
            lambda: 'return x == "1s";'
          then:
            - uart.write:
                id: uart_bus
                data: [0x08, 0xC6, 0x04, 0x08, 0x00, 0xF2, 0xC9, 0x01, 0xFD, 0x6A]
      - if:
          condition:
            lambda: 'return x == "3s";'
          then:
            - uart.write:
                id: uart_bus
                data: [0x08, 0xC6, 0x04, 0x08, 0x00, 0xF2, 0xC9, 0x03, 0xFD, 0x68]
      - if:
          condition:
            lambda: 'return x == "5s";'
          then:
            - uart.write:
                id: uart_bus
                data: [0x08, 0xC6, 0x04, 0x08, 0x00, 0xF2, 0xC9, 0x05, 0xFD, 0x66]
      - if:
          condition:
            lambda: 'return x == "7s";'
          then:
            - uart.write:
                id: uart_bus
                data: [0x08, 0xC6, 0x04, 0x08, 0x00, 0xF2, 0xC9, 0x07, 0xFD, 0x64]
      - if:
          condition:
            lambda: 'return x == "No Repeat";'
          then:
            - uart.write:
                id: uart_bus
                data: [0x08, 0xC6, 0x04, 0x08, 0x00, 0xF2, 0xC9, 0x09, 0xFD, 0x62]

switch:
  # Collimation flashing
  - platform: template
    name: "Collimation Flashing"
    id: collimation_flashing
    optimistic: true
    icon: mdi:line-scan
    entity_category: CONFIG
    restore_mode: RESTORE_DEFAULT_ON
    turn_on_action:
      - uart.write:
          id: uart_bus
          data: [0x08, 0xC6, 0x04, 0x08, 0x00, 0xF2, 0xB8, 0x00, 0xFD, 0x7C]
    turn_off_action:
      - uart.write:
          id: uart_bus
          data: [0x08, 0xC6, 0x04, 0x08, 0x00, 0xF2, 0xB8, 0x01, 0xFD, 0x7B]

  # Scanning enabled/disabled
  - platform: template
    name: "Scanning Enabled"
    id: scanning_enable
    optimistic: true
    icon: mdi:barcode-off
    entity_category: CONFIG
    restore_mode: RESTORE_DEFAULT_ON
    turn_on_action:
      - uart.write:
          id: uart_bus
          data: [0x04, 0xE9, 0x04, 0x00, 0xFF, 0x0F]
    turn_off_action:
      - uart.write:
          id: uart_bus
          data: [0x04, 0xEA, 0x04, 0x00, 0xFF, 0x0E]
