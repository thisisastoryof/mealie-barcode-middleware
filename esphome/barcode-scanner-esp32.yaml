#######################################################################################################
# ESP32 and GM67 Barcode Scanner
#######################################################################################################
# All credentials are stored in secrets.yaml.
# 1:1 feature parity with the ESP8266 version — only MCU, pins, and framework differ.

substitutions:
  friendly_name: "Barcode Scanner"
  gm67_baud: "9600"
  tx_pin: GPIO17     # UART2 TX — no boot conflict
  rx_pin: GPIO16     # UART2 RX — no boot conflict
  sda_pin: GPIO21    # Default I2C SDA (OLED)
  scl_pin: GPIO22    # Default I2C SCL (OLED)
  button_pin: GPIO25  # Commonly exposed on 28-pin boards, no boot strapping
  oled_address: "0x3C"

esphome:
  name: barcode-scanner
  friendly_name: ${friendly_name}
  on_boot:
    priority: -10
    then:
      - lambda: "id(oled).turn_on();"
      - text_sensor.template.publish:
          id: screen_mode
          state: "connecting"
      - delay: 30s
      - if:
          condition:
            text_sensor.state:
              id: screen_mode
              state: "connecting"
          then:
            - if:
                condition:
                  wifi.connected:
                then:
                  # WiFi ok but HA didn't connect — device can still scan
                  - script.execute: show_ready
                else:
                  # No WiFi — AP fallback is active
                  - text_sensor.template.publish:
                      id: screen_mode
                      state: "standby"
                  - lambda: "id(oled).turn_off();"

esp32:
  board: esp32dev
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP_TASK_WDT_TIMEOUT_S: "15"

# Serial logging available — UART2 used for scanner, USB serial stays free
logger:

# Enable Home Assistant API
api:
  encryption:
    key: !secret api_key
  on_client_connected:
    - script.stop: standby_timer
    - script.execute: show_ready
  on_client_disconnected: [] # Scanning works without HA — no visible change needed

ota:
  - platform: esphome
    password: !secret ota_pwd

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_pwd

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: ${friendly_name}
    password: !secret ap_pwd

captive_portal:

# HTTP request component for POSTing to the middleware
# WDT raised to 15s via sdkconfig — ESP timeout must stay below that.
http_request:
  useragent: "ESPHome/BarcodeScanner"
  timeout: 14s
  verify_ssl: false

# JSON parsing support (for reading response body)
json:

# Web server for diagnostics (http://<device-ip>/) — ESP32 has plenty of RAM
web_server:
  port: 80

#######################################################################################################
# CONFIG THE DEVICE
#######################################################################################################

# UART2 — dedicated hardware UART for the GM67 barcode scanner
uart:
  id: uart_bus
  baud_rate: ${gm67_baud}
  tx_pin: ${tx_pin}
  rx_pin: ${rx_pin}
  debug:
    direction: RX
    dummy_receiver: true
    after:
      delimiter: "\r"
    sequence:
      - lambda: |-
          std::string str(bytes.begin(), bytes.end());
          str.erase(str.find_last_not_of(" \n\r\t") + 1);
          if (str.empty()) return;
          // Ignore binary GM67 config responses — only accept printable ASCII
          for (char c : str) {
            if (c < 0x20 || c > 0x7E) return;
          }
          id(barcode_raw).publish_state(str);

# Template sensors for display state and scan data
text_sensor:
  - platform: template
    name: "Screen Mode"
    id: screen_mode

  - platform: template
    name: "Last Result"
    id: last_result

  - platform: template
    name: "Last Barcode"
    id: last_barcode

  - platform: template
    name: "Last Result Type"
    id: last_result_type

  - platform: template
    name: "Last Brand"
    id: last_brand

  - platform: template
    name: "Last Quantity"
    id: last_quantity

  - platform: template
    name: "Pending Action URL"
    id: pending_action_url
    internal: true

  - platform: template
    name: "Barcode Raw"
    id: barcode_raw
    on_value:
      then:
        - lambda: |-
            id(scan_count_val) += 1;
            id(scan_count).publish_state(id(scan_count_val));
            id(oled).turn_on();
        - text_sensor.template.publish:
            id: last_barcode
            state: !lambda "return x;"
        - text_sensor.template.publish:
            id: screen_mode
            state: "scanning"
        # Give scanner LED/laser current peak time to settle before WiFi TX
        - delay: 300ms
        - http_request.post:
            url: !secret middleware_url
            request_headers:
              Content-Type: "application/json"
              Authorization: !secret middleware_auth_header
            body: !lambda |-
              return "{\"barcode\":\"" + x + "\"}";
            capture_response: true
            max_response_buffer_size: 1024
            on_response:
              then:
                - if:
                    condition:
                      lambda: return response->status_code == 200;
                    then:
                      - lambda: |-
                          json::parse_json(body, [](JsonObject root) -> bool {
                            // Display name
                            std::string item_name = root["item"] | "";
                            std::string result = root["result"] | "unknown";

                            if (item_name.empty()) item_name = "Unknown";
                            id(last_result).publish_state(item_name);
                            id(last_result_type).publish_state(result);

                            // Display enrichment (brand/quantity for OLED)
                            std::string brand = root["brand"] | "";
                            std::string qty = root["quantity"] | "";
                            id(last_brand).publish_state(brand);
                            id(last_quantity).publish_state(qty);

                            // Notification relay — store action_url for HA event
                            bool needs_action = root["needs_action"] | false;
                            std::string action_url = root["action_url"] | "";
                            id(pending_action_url).publish_state(needs_action ? action_url : "");

                            return true;
                          });
                          id(screen_mode).publish_state("result");
                    else:
                      - lambda: |-
                          ESP_LOGW("scan", "Middleware returned HTTP %d", response->status_code);
                          id(last_result).publish_state("Server error");
                          id(last_result_type).publish_state("error");
                          id(screen_mode).publish_state("result");
                - script.execute: standby_timer
                # Fire HA event on every scan — HA automations filter on needs_action
                - homeassistant.event:
                    event: esphome.barcode_scanned
                    data:
                      barcode: !lambda "return id(last_barcode).state;"
                      item: !lambda "return id(last_result).state;"
                      result_type: !lambda "return id(last_result_type).state;"
                      needs_action: !lambda 'return id(pending_action_url).state.empty() ? "false" : "true";'
                      action_url: !lambda "return id(pending_action_url).state;"
            on_error:
              then:
                - lambda: |-
                    ESP_LOGW("scan", "HTTP request failed (timeout or connection error)");
                    id(last_result).publish_state("No response");
                    id(last_result_type).publish_state("timeout");
                    id(screen_mode).publish_state("result");
                - script.execute: standby_timer

# Timer to return to standby after showing result (uses configurable timeout)
# NOTE: Sensor states are NOT cleared — kept so button press can recall last result.
script:
  - id: standby_timer
    mode: restart
    then:
      - delay: !lambda "return id(display_timeout).state * 1000;"
      - text_sensor.template.publish:
          id: screen_mode
          state: "standby"
      - lambda: "id(oled).turn_off();"

  - id: show_ready
    mode: restart
    then:
      - lambda: "id(oled).turn_on();"
      - text_sensor.template.publish:
          id: screen_mode
          state: "ready"
      - delay: 5s
      - text_sensor.template.publish:
          id: screen_mode
          state: "standby"
      - lambda: "id(oled).turn_off();"

  - id: wake_display_result
    mode: restart
    then:
      - lambda: "id(oled).turn_on();"
      - if:
          condition:
            lambda: 'return id(last_barcode).state.empty();'
          then:
            - script.execute: wake_display_status
          else:
            - text_sensor.template.publish:
                id: screen_mode
                state: "result"
            - delay: !lambda "return id(display_timeout).state * 1000;"
            - text_sensor.template.publish:
                id: screen_mode
                state: "standby"
            - lambda: "id(oled).turn_off();"

  - id: wake_display_status
    mode: restart
    then:
      - lambda: "id(oled).turn_on();"
      - text_sensor.template.publish:
          id: screen_mode
          state: "status"
      - delay: !lambda "return id(display_timeout).state * 1000;"
      - text_sensor.template.publish:
          id: screen_mode
          state: "standby"
      - lambda: "id(oled).turn_off();"

# Scan counter + diagnostics
sensor:
  - platform: template
    name: "Scan Count"
    id: scan_count
    icon: mdi:counter
    entity_category: DIAGNOSTIC
    accuracy_decimals: 0
    lambda: "return id(scan_count_val);"

  - platform: wifi_signal
    name: "WiFi Signal"
    id: wifi_rssi
    update_interval: 30s
    entity_category: DIAGNOSTIC

  - platform: uptime
    name: "Uptime"
    id: uptime_sensor
    update_interval: 60s
    entity_category: DIAGNOSTIC

globals:
  - id: scan_count_val
    type: int
    restore_value: true
    initial_value: "0"

#######################################################################################################
# OLED Display (SSD1306 128x64 I2C) + Button + Timeout
#######################################################################################################

# I2C bus for OLED
i2c:
  sda: ${sda_pin}
  scl: ${scl_pin}
  scan: false

# Fonts — European character set for product names
font:
  - file: "gfonts://Roboto"
    id: font_body
    size: 10
    glyphs: ' !"#$%&''()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[\]^_`abcdefghijklmnopqrstuvwxyz{|}~ÄÖÜäöüßÉÈÊËéèêëÀÂàâÇçÅåØøÆæ°€'

  - file: "gfonts://Roboto"
    id: font_heading
    size: 14
    glyphs: ' ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789.-!?:ÄÖÜäöüß'

  # MDI icons — only the specific icons we use
  - file:
      type: web
      url: "https://github.com/Templarian/MaterialDesign-Webfont/raw/master/fonts/materialdesignicons-webfont.ttf"
    id: font_icons
    size: 18
    glyphs:
      - "\U000F05E0" # mdi:check-circle
      - "\U000F0026" # mdi:alert
      - "\U000F0159" # mdi:close-circle
      - "\U000F05A9" # mdi:wifi
      - "\U000F092D" # mdi:wifi-off
      - "\U000F029A" # mdi:barcode-scan

# OLED display — off by default, wakes on scan or button press
display:
  - platform: ssd1306_i2c
    model: "SSD1306 128x64"
    id: oled
    address: ${oled_address}
    update_interval: 250ms
    lambda: |-
      auto mode = id(screen_mode).state;

      if (mode == "standby" || mode.empty()) {
        it.fill(COLOR_OFF);
        return;
      }

      if (mode == "connecting") {
        it.fill(COLOR_OFF);
        it.printf(64, 20, id(font_heading), TextAlign::TOP_CENTER, "Barcode Scanner");
        it.printf(64, 40, id(font_body), TextAlign::TOP_CENTER, "Connecting...");
        return;
      }

      if (mode == "ready") {
        it.fill(COLOR_OFF);
        it.printf(0, 20, id(font_icons), "\U000F05E0");  // check-circle
        it.printf(22, 22, id(font_heading), "Connected");
        it.printf(64, 44, id(font_body), TextAlign::TOP_CENTER, "Ready to scan");
        return;
      }

      if (mode == "scanning") {
        it.fill(COLOR_OFF);
        it.printf(64, 16, id(font_heading), TextAlign::TOP_CENTER, "Looking up...");
        it.printf(64, 34, id(font_body), TextAlign::TOP_CENTER, "%s", id(last_barcode).state.c_str());
        // Animated dots — cycle every 750ms
        int dots = ((int)(millis() / 750)) % 4;
        std::string progress = "";
        for (int i = 0; i < dots; i++) progress += ".";
        it.printf(64, 48, id(font_body), TextAlign::TOP_CENTER, "%s", progress.c_str());
        return;
      }

      if (mode == "result") {
        it.fill(COLOR_OFF);
        // Result type header with icon
        auto rtype = id(last_result_type).state;
        if (rtype == "added" || rtype == "added_as_note") {
          it.printf(0, 0, id(font_icons), "\U000F05E0");  // check-circle
          it.printf(22, 2, id(font_heading), "Added");
        } else if (rtype == "queued") {
          it.printf(0, 0, id(font_icons), "\U000F0026");  // alert
          it.printf(22, 2, id(font_heading), "Queued");
        } else if (rtype == "unknown") {
          it.printf(0, 0, id(font_icons), "\U000F0026");  // alert
          it.printf(22, 2, id(font_heading), "Needs Mapping");
        } else if (rtype == "timeout") {
          it.printf(0, 0, id(font_icons), "\U000F0026");  // alert
          it.printf(22, 2, id(font_heading), "Timed Out");
        } else {
          it.printf(0, 0, id(font_icons), "\U000F0159");  // close-circle
          it.printf(22, 2, id(font_heading), "Error");
        }

        // Item name
        it.printf(0, 22, id(font_body), "%s", id(last_result).state.c_str());

        // Brand / quantity line
        auto brand = id(last_brand).state;
        auto qty = id(last_quantity).state;
        std::string detail;
        if (!brand.empty() && !qty.empty()) detail = brand + " " + qty;
        else if (!brand.empty()) detail = brand;
        else if (!qty.empty()) detail = qty;
        if (!detail.empty()) {
          it.printf(0, 34, id(font_body), "%s", detail.c_str());
        }

        // Separator + barcode at bottom
        it.line(0, 48, 128, 48);
        it.printf(0, 52, id(font_body), "%s", id(last_barcode).state.c_str());
        return;
      }

      if (mode == "status") {
        it.fill(COLOR_OFF);
        it.printf(0, 0, id(font_heading), "Barcode Scanner");

        // WiFi signal bar
        float rssi_f = id(wifi_rssi).state;
        int bars = 0;
        if (std::isnan(rssi_f)) {
          it.printf(0, 18, id(font_body), "WiFi: no signal");
        } else {
          int rssi = (int)rssi_f;
          if (rssi > -50) bars = 5;
          else if (rssi > -60) bars = 4;
          else if (rssi > -70) bars = 3;
          else if (rssi > -80) bars = 2;
          else if (rssi > -90) bars = 1;
          it.printf(0, 18, id(font_body), "WiFi: %d dBm", rssi);
        }
        for (int i = 0; i < 5; i++) {
          int h = 2 + i * 2;
          if (i < bars)
            it.filled_rectangle(90 + i*4, 28-h, 3, h);
          else
            it.rectangle(90 + i*4, 28-h, 3, h);
        }

        // IP address
        auto ips = network::get_ip_addresses();
        if (!ips.empty()) {
          char ip_buf[network::IP_ADDRESS_BUFFER_SIZE];
          ips[0].str_to(ip_buf);
          it.printf(0, 30, id(font_body), "IP: %s", ip_buf);
        } else {
          it.printf(0, 30, id(font_body), "IP: none");
        }

        // Scan count
        it.printf(0, 42, id(font_body), "Scans: %.0f", id(scan_count).state);

        // Uptime
        int uptime_s = (int)id(uptime_sensor).state;
        int days = uptime_s / 86400;
        int hours = (uptime_s % 86400) / 3600;
        if (days > 0) {
          it.printf(0, 54, id(font_body), "Uptime: %dd %dh", days, hours);
        } else {
          int mins = (uptime_s % 3600) / 60;
          it.printf(0, 54, id(font_body), "Uptime: %dh %dm", hours, mins);
        }
        return;
      }

# Physical button — short press shows last result, long press shows status
binary_sensor:
  - platform: gpio
    pin:
      number: ${button_pin}
      mode: INPUT_PULLUP
      inverted: true   # Active-low: button connects to GND
    name: "Display Button"
    id: display_button
    filters:
      - delayed_on: 10ms
      - delayed_off: 10ms
    on_click:
      - min_length: 50ms
        max_length: 1000ms
        then:
          - script.execute: wake_display_result
      - min_length: 1000ms
        max_length: 5000ms
        then:
          - script.execute: wake_display_status

# Configurable standby timeout — adjustable from HA
number:
  - platform: template
    name: "Display Timeout"
    id: display_timeout
    icon: mdi:timer-outline
    entity_category: CONFIG
    unit_of_measurement: "s"
    min_value: 2
    max_value: 30
    step: 1
    initial_value: 8
    restore_value: true
    optimistic: true

#######################################################################################################
# GM67 Scanner Configuration (via UART commands)
#######################################################################################################
# These settings are stored in ESPHome's flash (restore_value: true) and re-applied on every boot.
# The GM67 does NOT persist UART-configured settings across power loss — ESPHome handles persistence.
# Change defaults via initial_option; after first boot, the last user selection is remembered.

select:
  # Scanning trigger mode
  - platform: template
    name: "Trigger Mode"
    id: scan_mode
    optimistic: true
    icon: mdi:auto-mode
    entity_category: CONFIG
    options:
      - Button Holding
      - Button Trigger
      - Continuous Scanning
      - Automatic Induction
      - Host
    initial_option: Automatic Induction
    restore_value: true
    on_value:
      - if:
          condition:
            lambda: 'return x == "Button Holding";'
          then:
            - uart.write:
                id: uart_bus
                data: [0x07, 0xC6, 0x04, 0x08, 0x00, 0x8A, 0x00, 0xFE, 0x9D]
      - if:
          condition:
            lambda: 'return x == "Button Trigger";'
          then:
            - uart.write:
                id: uart_bus
                data: [0x07, 0xC6, 0x04, 0x08, 0x00, 0x8A, 0x02, 0xFE, 0x9B]
      - if:
          condition:
            lambda: 'return x == "Continuous Scanning";'
          then:
            - uart.write:
                id: uart_bus
                data: [0x07, 0xC6, 0x04, 0x08, 0x00, 0x8A, 0x04, 0xFE, 0x99]
      - if:
          condition:
            lambda: 'return x == "Automatic Induction";'
          then:
            - uart.write:
                id: uart_bus
                data: [0x07, 0xC6, 0x04, 0x08, 0x00, 0x8A, 0x09, 0xFE, 0x94]
      - if:
          condition:
            lambda: 'return x == "Host";'
          then:
            - uart.write:
                id: uart_bus
                data: [0x07, 0xC6, 0x04, 0x08, 0x00, 0x8A, 0x08, 0xFE, 0x95]

  # Buzzer volume
  - platform: template
    name: "Buzzer Volume"
    id: buzzer_volume
    optimistic: true
    icon: mdi:volume-high
    entity_category: CONFIG
    options:
      - "Off"
      - Low
      - Medium
      - High
    initial_option: Medium
    restore_value: true
    on_value:
      - if:
          condition:
            lambda: 'return x == "Off";'
          then:
            - uart.write:
                id: uart_bus
                data: [0x07, 0xC6, 0x04, 0x08, 0x00, 0x38, 0x00, 0xFE, 0xEF]
      - if:
          condition:
            lambda: 'return x == "Low";'
          then:
            - uart.write:
                id: uart_bus
                data: [0x07, 0xC6, 0x04, 0x08, 0x00, 0x38, 0x01, 0xFE, 0xEE]
            - uart.write:
                id: uart_bus
                data: [0x07, 0xC6, 0x04, 0x08, 0x00, 0x8C, 0x02, 0xFE, 0x99]
      - if:
          condition:
            lambda: 'return x == "Medium";'
          then:
            - uart.write:
                id: uart_bus
                data: [0x07, 0xC6, 0x04, 0x08, 0x00, 0x38, 0x01, 0xFE, 0xEE]
            - uart.write:
                id: uart_bus
                data: [0x07, 0xC6, 0x04, 0x08, 0x00, 0x8C, 0x01, 0xFE, 0x9A]
      - if:
          condition:
            lambda: 'return x == "High";'
          then:
            - uart.write:
                id: uart_bus
                data: [0x07, 0xC6, 0x04, 0x08, 0x00, 0x38, 0x01, 0xFE, 0xEE]
            - uart.write:
                id: uart_bus
                data: [0x07, 0xC6, 0x04, 0x08, 0x00, 0x8C, 0x00, 0xFE, 0x9B]

  # Scanning light (illumination LED)
  - platform: template
    name: "Scanning Light"
    id: scanning_light
    optimistic: true
    icon: mdi:lightbulb-on
    entity_category: CONFIG
    options:
      - On When Reading
      - Always On
      - Always Off
    initial_option: On When Reading
    restore_value: true
    on_value:
      - if:
          condition:
            lambda: 'return x == "On When Reading";'
          then:
            - uart.write:
                id: uart_bus
                data:
                  [0x08, 0xC6, 0x04, 0x08, 0x00, 0xF2, 0x02, 0x00, 0xFE, 0x32]
      - if:
          condition:
            lambda: 'return x == "Always On";'
          then:
            - uart.write:
                id: uart_bus
                data:
                  [0x08, 0xC6, 0x04, 0x08, 0x00, 0xF2, 0x02, 0x01, 0xFE, 0x31]
      - if:
          condition:
            lambda: 'return x == "Always Off";'
          then:
            - uart.write:
                id: uart_bus
                data:
                  [0x08, 0xC6, 0x04, 0x08, 0x00, 0xF2, 0x02, 0x02, 0xFE, 0x30]

  # Collimation (aiming laser)
  - platform: template
    name: "Collimation"
    id: collimation
    optimistic: true
    icon: mdi:line-scan
    entity_category: CONFIG
    options:
      - On When Reading
      - Always On
      - Always Off
    initial_option: On When Reading
    restore_value: true
    on_value:
      - if:
          condition:
            lambda: 'return x == "On When Reading";'
          then:
            - uart.write:
                id: uart_bus
                data:
                  [0x08, 0xC6, 0x04, 0x08, 0x00, 0xF2, 0x03, 0x00, 0xFE, 0x31]
      - if:
          condition:
            lambda: 'return x == "Always On";'
          then:
            - uart.write:
                id: uart_bus
                data:
                  [0x08, 0xC6, 0x04, 0x08, 0x00, 0xF2, 0x03, 0x01, 0xFE, 0x30]
      - if:
          condition:
            lambda: 'return x == "Always Off";'
          then:
            - uart.write:
                id: uart_bus
                data:
                  [0x08, 0xC6, 0x04, 0x08, 0x00, 0xF2, 0x03, 0x02, 0xFE, 0x2F]

  # Same barcode re-scan delay
  - platform: template
    name: "Same Code Delay"
    id: same_code_delay
    optimistic: true
    icon: mdi:repeat-variant
    entity_category: CONFIG
    options:
      - 0.5s
      - 1s
      - 3s
      - 5s
      - 7s
      - No Repeat
    initial_option: 3s
    restore_value: true
    on_value:
      - if:
          condition:
            lambda: 'return x == "0.5s";'
          then:
            - uart.write:
                id: uart_bus
                data:
                  [0x08, 0xC6, 0x04, 0x08, 0x00, 0xF3, 0x03, 0x05, 0xFE, 0x2B]
      - if:
          condition:
            lambda: 'return x == "1s";'
          then:
            - uart.write:
                id: uart_bus
                data:
                  [0x08, 0xC6, 0x04, 0x08, 0x00, 0xF2, 0xC9, 0x01, 0xFD, 0x6A]
      - if:
          condition:
            lambda: 'return x == "3s";'
          then:
            - uart.write:
                id: uart_bus
                data:
                  [0x08, 0xC6, 0x04, 0x08, 0x00, 0xF2, 0xC9, 0x03, 0xFD, 0x68]
      - if:
          condition:
            lambda: 'return x == "5s";'
          then:
            - uart.write:
                id: uart_bus
                data:
                  [0x08, 0xC6, 0x04, 0x08, 0x00, 0xF2, 0xC9, 0x05, 0xFD, 0x66]
      - if:
          condition:
            lambda: 'return x == "7s";'
          then:
            - uart.write:
                id: uart_bus
                data:
                  [0x08, 0xC6, 0x04, 0x08, 0x00, 0xF2, 0xC9, 0x07, 0xFD, 0x64]
      - if:
          condition:
            lambda: 'return x == "No Repeat";'
          then:
